<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以损定仓计算器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 {
    text-align: center;
    font-size: 18px;
    margin-bottom: 24px;
    font-weight: 600;
  }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    color: #888;
    margin-bottom: 4px;
  }
  .input-wrap { position: relative; }
  .input-wrap .unit {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 13px;
    pointer-events: none;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    padding-right: 32px;
    background: #f9f9f9;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    color: #333;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #333; }
  .calc-btn {
    width: 100%;
    padding: 12px;
    background: #333;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .calc-btn:hover { background: #555; }
  .result {
    margin-top: 20px;
    display: none;
  }
  .result.show { display: block; }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
  }
  .result-row + .result-row { border-top: 1px solid #f0f0f0; }
  .result-label { font-size: 13px; color: #888; }
  .result-value { font-size: 16px; font-weight: 600; }
  .error {
    color: #e53e3e;
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>以损定仓计算器</h1>

  <div class="field">
    <label>开单价格</label>
    <div class="input-wrap">
      <input type="number" id="entry" placeholder="0.00" step="any">
    </div>
  </div>

  <div class="field">
    <label>止损价格</label>
    <div class="input-wrap">
      <input type="number" id="stop" placeholder="0.00" step="any">
    </div>
  </div>

  <div class="field">
    <label>最大承受止损金额</label>
    <div class="input-wrap">
      <input type="number" id="maxLoss" placeholder="0.00" step="any">
      <span class="unit">$</span>
    </div>
  </div>

  <div class="field">
    <label>手续费（单向）</label>
    <div class="input-wrap">
      <input type="number" id="fee" placeholder="0.05" value="0.05" step="any">
      <span class="unit">%</span>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">计算</button>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-row">
      <span class="result-label">仓位数量</span>
      <span class="result-value" id="res-qty">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">仓位金额</span>
      <span class="result-value" id="res-amount">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">预计手续费（开+平）</span>
      <span class="result-value" id="res-fee">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">止损幅度</span>
      <span class="result-value" id="res-pct">—</span>
    </div>
  </div>
</div>

<script>
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('result').classList.remove('show');
}

function calculate() {
  const entry = parseFloat(document.getElementById('entry').value);
  const stop = parseFloat(document.getElementById('stop').value);
  const maxLoss = parseFloat(document.getElementById('maxLoss').value);
  const feePct = parseFloat(document.getElementById('fee').value);
  document.getElementById('error').classList.remove('show');

  if (isNaN(entry) || isNaN(stop) || isNaN(maxLoss) || isNaN(feePct)) {
    return showError('请填写所有字段');
  }
  if (entry <= 0 || stop <= 0 || maxLoss <= 0 || feePct < 0) {
    return showError('价格和金额需大于0，手续费不能为负');
  }
  if (entry === stop) {
    return showError('开单价与止损价不能相同');
  }

  const feeRate = feePct / 100;
  const lossPerUnit = Math.abs(entry - stop);
  const feePerUnit = entry * feeRate + stop * feeRate;
  const costPerUnit = lossPerUnit + feePerUnit;

  const qty = maxLoss / costPerUnit;
  const amount = qty * entry;
  const totalFee = qty * feePerUnit;
  const stopPct = (lossPerUnit / entry) * 100;

  document.getElementById('res-qty').textContent = formatNum(qty);
  document.getElementById('res-amount').textContent = '$' + formatNum(amount);
  document.getElementById('res-fee').textContent = '$' + formatNum(totalFee);
  document.getElementById('res-pct').textContent = stopPct.toFixed(2) + '%';
  document.getElementById('result').classList.add('show');
}

function formatNum(n) {
  if (n >= 1) return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parseFloat(n.toPrecision(6)).toString();
}
</script>
</body>
</html>
