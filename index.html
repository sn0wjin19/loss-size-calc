<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以损定仓计算器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 40px 20px;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 {
    text-align: center;
    font-size: 18px;
    margin-bottom: 24px;
    font-weight: 600;
  }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    color: #888;
    margin-bottom: 4px;
  }
  .input-wrap { position: relative; }
  .input-wrap .unit {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 13px;
    pointer-events: none;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    padding-right: 32px;
    background: #f9f9f9;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    color: #333;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #333; }
  .result {
    margin-top: 20px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
  }
  .result-row + .result-row { border-top: 1px solid #f0f0f0; }
  .result-label { font-size: 13px; color: #888; }
  .result-value { font-size: 16px; font-weight: 600; }
  .result-value.na { color: #ccc; font-weight: 400; }
  .tp-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-top: 16px;
  }
  .tp-title {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>以损定仓计算器</h1>

  <div class="field">
    <label>开单价格</label>
    <div class="input-wrap">
      <input type="number" id="entry" placeholder="0.00" step="any">
    </div>
  </div>

  <div class="field">
    <label>止损价格</label>
    <div class="input-wrap">
      <input type="number" id="stop" placeholder="0.00" step="any">
    </div>
  </div>

  <div class="field">
    <label>最大承受止损金额</label>
    <div class="input-wrap">
      <input type="number" id="maxLoss" placeholder="0.00" step="any">
      <span class="unit">$</span>
    </div>
  </div>

  <div class="field">
    <label>手续费（单向）</label>
    <div class="input-wrap">
      <input type="number" id="fee" placeholder="0.055" value="0.055" step="any">
      <span class="unit">%</span>
    </div>
  </div>

  <div class="result">
    <div class="result-row">
      <span class="result-label">仓位数量</span>
      <span class="result-value na" id="res-qty">n/a</span>
    </div>
    <div class="result-row">
      <span class="result-label">仓位金额</span>
      <span class="result-value na" id="res-amount">n/a</span>
    </div>
    <div class="result-row">
      <span class="result-label">预计手续费（开+平）</span>
      <span class="result-value na" id="res-fee">n/a</span>
    </div>
    <div class="result-row">
      <span class="result-label">止损幅度</span>
      <span class="result-value na" id="res-pct">n/a</span>
    </div>
  </div>
</div>

<div class="tp-card">
  <div class="tp-title">止盈目标价格</div>
  <div class="result-row">
    <span class="result-label">1 : 1</span>
    <span class="result-value na" id="tp-1">n/a</span>
  </div>
  <div class="result-row">
    <span class="result-label">1.5 : 1</span>
    <span class="result-value na" id="tp-15">n/a</span>
  </div>
  <div class="result-row">
    <span class="result-label">2 : 1</span>
    <span class="result-value na" id="tp-2">n/a</span>
  </div>
</div>

<script>
const inputs = ['entry', 'stop', 'maxLoss', 'fee'];
inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));

function setNA(id) {
  const el = document.getElementById(id);
  el.textContent = 'n/a';
  el.classList.add('na');
}

function setVal(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.remove('na');
}

function calculate() {
  const entry = parseFloat(document.getElementById('entry').value);
  const stop = parseFloat(document.getElementById('stop').value);
  const maxLoss = parseFloat(document.getElementById('maxLoss').value);
  const feePct = parseFloat(document.getElementById('fee').value);

  if (isNaN(entry) || isNaN(stop) || isNaN(maxLoss) || isNaN(feePct) ||
      entry <= 0 || stop <= 0 || maxLoss <= 0 || feePct < 0 || entry === stop) {
    ['res-qty', 'res-amount', 'res-fee', 'res-pct', 'tp-1', 'tp-15', 'tp-2'].forEach(setNA);
    return;
  }

  const feeRate = feePct / 100;
  const lossPerUnit = Math.abs(entry - stop);
  const feePerUnit = entry * feeRate + stop * feeRate;
  const costPerUnit = lossPerUnit + feePerUnit;

  const qty = maxLoss / costPerUnit;
  const amount = qty * entry;
  const totalFee = qty * feePerUnit;
  const stopPct = (lossPerUnit / entry) * 100;

  setVal('res-qty', formatNum(qty));
  setVal('res-amount', '$' + formatNum(amount));
  setVal('res-fee', '$' + formatNum(totalFee));
  setVal('res-pct', stopPct.toFixed(2) + '%');

  const dir = entry > stop ? 1 : -1;
  // TP fee-adjusted: net profit = ratio * costPerUnit
  // Long: tp(1 - feeRate) = ratio*costPerUnit + entry*(1+feeRate)
  // Short: tp(1 + feeRate) = entry*(1-feeRate) - ratio*costPerUnit
  function tpPrice(ratio) {
    if (dir === 1) return (ratio * costPerUnit + entry * (1 + feeRate)) / (1 - feeRate);
    else           return (entry * (1 - feeRate) - ratio * costPerUnit) / (1 + feeRate);
  }
  setVal('tp-1',  formatNum(tpPrice(1)));
  setVal('tp-15', formatNum(tpPrice(1.5)));
  setVal('tp-2',  formatNum(tpPrice(2)));
}

function formatNum(n) {
  if (n >= 1) return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parseFloat(n.toPrecision(6)).toString();
}
</script>
</body>
</html>
